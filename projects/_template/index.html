<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Project Title — Category</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <!-- Keep the relative path depth the same as other project pages -->
  <link rel="stylesheet" href="../../../style.css" />
</head>
<body>
  <!-- Header: brand right-aligned, no back button here -->
  <header class="py-3 px-3 px-lg-4">
    <div class="container d-flex justify-content-end align-items-center">
      <div class="text-light-custom fw-bold">Tristen</div>
    </div>
  </header>

  <main class="container py-4 py-lg-5">
    <!-- Title row with back button aligned right -->
    <section class="bg-dark-custom rounded-4 p-3 p-lg-5 mb-4" data-aos="fade-up">
      <div class="d-flex justify-content-between align-items-center gap-3">
        <h1 class="display-5 text-light-custom mb-2 mb-lg-0">Project Title</h1>
        <a href="../../../portfolio.html" class="btn btn-back">Back to Portfolio</a>
      </div>
      <p class="text-secondary mb-3">Category • Year • Location</p>
      <div class="row g-3 text-light-custom">
        <div class="col-md-6">
          <p class="mb-1"><strong>Role:</strong> Your role here</p>
          <p class="mb-1"><strong>Tools:</strong> Tools / Gear / Methods</p>
        </div>
        <div class="col-md-6">
          <p class="mb-1"><strong>Summary:</strong> One or two sentences describing the project.</p>
        </div>
      </div>
    </section>

    <!-- Content grid (example) -->
    <section class="mb-5" data-aos="fade-up">
      <div class="row g-3">
        <!-- Example: replace with your images/content -->
        <div class="col-12 col-lg-6">
          <a href="../../../images/projects/example/001.jpg" class="image-link d-block" title="Example caption">
            <img src="../../../images/projects/example/001.jpg" class="img-fluid rounded-4" alt="Example image 1">
          </a>
        </div>
        <div class="col-12 col-lg-6">
          <a href="../../../images/projects/example/002.jpg" class="image-link d-block" title="Example caption">
            <img src="../../../images/projects/example/002.jpg" class="img-fluid rounded-4" alt="Example image 2">
          </a>
        </div>
      </div>
    </section>

    <!-- Bottom nav: only Prev/Next, no back-to-portfolio here -->
    <section class="d-flex justify-content-end align-items-center mb-5" data-aos="fade-up">
      <div class="d-flex gap-2">
        <a href="#" class="btn btn-outline-light disabled" tabindex="-1" aria-disabled="true">← Prev</a>
        <a href="#" class="btn btn-outline-light disabled" tabindex="-1" aria-disabled="true">Next →</a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../../js/jquery-1.11.0.min.js"></script>
  <script src="../../../js/plugins.js"></script>
  <script src="../../../js/script.js?v=2"></script>
</body>
</html>
